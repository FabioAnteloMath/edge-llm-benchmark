name: bench-macos-arm

on:
  workflow_dispatch:
  schedule:
    # Weekly on Sunday at 06:00 UTC (offset from linux to avoid collisions)
    - cron: "0 6 * * 0"

jobs:
  benchmark:
    runs-on: macos-14   # Apple Silicon (M1) runner
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --no-deps -e .
          pip install pytest pytest-cov ruff mypy

      - name: Lint + format
        run: |
          set -e
          python -m ruff --version
          python -m ruff check src/ tests/
          python -m ruff format --check src/ tests/

      - name: Unit tests
        run: pytest tests/ -v

      - name: Type check (best-effort)
        continue-on-error: true
        run: |
          pip install --quiet pandas-stubs 2>/dev/null || true
          mypy src/ --no-incremental || true

      - name: Install Ollama (best-effort smoke)
        continue-on-error: true
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version

      - name: CI profile
        run: |
          cat > configs/profiles/ci-mac-small.yaml <<'EOF'
          host_name: ci-macos-arm
          os: darwin
          arch: arm64
          cpu_cores: 4
          ram_total_gb: 14
          ram_available_gb: 10
          gpu_type: apple
          vram_gb: null
          disk_free_gb: 30
          notes: "GitHub Actions macOS M1 runner profile."
          EOF

      - name: Start Ollama daemon
        continue-on-error: true
        run: |
          ollama serve &
          sleep 5
          ollama list

      - name: Pull small test model
        continue-on-error: true
        run: |
          ollama pull phi3:mini-4k-instruct-q4_K_M || true

      - name: Dry-run
        run: |
          python -m edge_llm_bench.runner \
            --profile configs/profiles/ci-mac-small.yaml \
            --config configs/matrix.yaml \
            --dry-run

      - name: Smoke (best-effort)
        continue-on-error: true
        run: |
          python -m edge_llm_bench.runner \
            --profile configs/profiles/ci-mac-small.yaml \
            --max-examples 3 \
            --skip-quality \
            --output-dir results/ci-mac-smoke || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-macos-arm
          path: results/
          if-no-files-found: ignore
