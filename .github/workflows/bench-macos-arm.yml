name: bench-macos-arm

on:
  workflow_dispatch:
  schedule:
    # Weekly on Sunday at 06:00 UTC (offset from linux to avoid collisions)
    - cron: "0 6 * * 0"
  push:
    branches: [main]

jobs:
  benchmark:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --no-deps -e .

      - name: Sanity check (import + dry-run)
        run: |
          python -c "
          import edge_llm_bench
          from edge_llm_bench.hardware_profiler import profile_hardware
          print('imports OK; version =', edge_llm_bench.__version__)
          "

          mkdir -p configs/profiles
          cat > configs/profiles/ci-mac-tiny.yaml <<'EOF'
          host_name: ci-mac-tiny
          os: darwin
          arch: arm64
          cpu_cores: 4
          ram_total_gb: 14
          ram_available_gb: 10
          gpu_type: apple
          vram_gb: null
          disk_free_gb: 20
          notes: "CI sanity profile for macOS arm64."
          EOF

          python -m edge_llm_bench.runner \
            --profile configs/profiles/ci-mac-tiny.yaml \
            --config configs/matrix.yaml \
            --dry-run

      - name: Smoke benchmark (best-effort)
        continue-on-error: true
        run: |
          # Try to install Ollama (may fail in restricted runners).
          curl -fsSL https://ollama.com/install.sh | sh 2>/dev/null || true
          ollama serve >/dev/null 2>&1 &
          sleep 5
          ollama pull phi3:mini-4k-instruct-q4_K_M 2>/dev/null || true
          python -m edge_llm_bench.runner \
            --profile configs/profiles/ci-mac-tiny.yaml \
            --max-examples 1 \
            --skip-quality \
            --output-dir results/ci-mac-smoke || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-macos-arm
          path: results/
          if-no-files-found: ignore
