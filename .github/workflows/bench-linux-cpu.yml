name: bench-linux-cpu

on:
  workflow_dispatch:
  schedule:
    # Weekly on Sunday at 03:00 UTC
    - cron: "0 3 * * 0"
  push:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # requirements.txt has the pinned versions validated locally.
          pip install -r requirements.txt
          # Install the package itself (no deps — they're already in).
          pip install --no-deps -e .

      - name: Sanity check (import + dry-run)
        run: |
          # Two things CI needs to prove:
          # 1. The package imports cleanly (no missing deps, no syntax errors)
          # 2. The CLI can resolve a matrix against a hardware profile
          # Both are pure-Python — no Ollama, no GPU, no model files needed.
          python -c "
          import edge_llm_bench
          from edge_llm_bench.hardware_profiler import profile_hardware
          from edge_llm_bench.runner import build_parser
          print('imports OK; version =', edge_llm_bench.__version__)
          print('hardware:', profile_hardware().os, profile_hardware().arch)
          "

          mkdir -p configs/profiles
          cat > configs/profiles/ci-tiny.yaml <<'EOF'
          host_name: ci-tiny
          os: linux
          arch: x86_64
          cpu_cores: 2
          ram_total_gb: 8
          ram_available_gb: 6
          gpu_type: none
          vram_gb: null
          disk_free_gb: 20
          notes: "CI sanity profile — small filter."
          EOF

          python -m edge_llm_bench.runner \
            --profile configs/profiles/ci-tiny.yaml \
            --config configs/matrix.yaml \
            --dry-run

      - name: Smoke benchmark (best-effort, requires Ollama)
        # CI runners don't have Ollama; this step is expected to fail.
        # continue-on-error keeps the workflow green; the failure is visible
        # in the Actions log for debugging.
        continue-on-error: true
        run: |
          python -m edge_llm_bench.runner \
            --profile configs/profiles/ci-tiny.yaml \
            --config configs/matrix.yaml \
            --max-examples 1 \
            --skip-quality \
            --output-dir results/ci-smoke || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-linux-cpu
          path: results/
          if-no-files-found: ignore
