name: bench-linux-cpu

on:
  workflow_dispatch:
  schedule:
    # Weekly on Sunday at 03:00 UTC
    - cron: "0 3 * * 0"
  push:
    paths:
      - "configs/**"
      - "src/**"
      - "tests/**"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint + type-check
        run: |
          ruff check .
          ruff format --check .
          mypy src/ --ignore-missing-imports

      - name: Unit tests
        run: pytest tests/ -v

      - name: Filter matrix to small models (CI disk budget)
        run: |
          mkdir -p configs/profiles
          cat > configs/profiles/ci-small.yaml <<'EOF'
          host_name: ci-linux-small
          os: linux
          arch: x86_64
          cpu_cores: 2
          ram_total_gb: 14
          ram_available_gb: 10
          gpu_type: none
          vram_gb: null
          disk_free_gb: 30
          notes: "CI filter — small models only."
          EOF

      - name: Dry-run
        run: |
          python -m edge_llm_bench.runner \
            --profile configs/profiles/ci-small.yaml \
            --config configs/matrix.yaml \
            --dry-run

      - name: Smoke run (1 model, 5 prompts)
        run: |
          python -m edge_llm_bench.runner \
            --profile configs/profiles/ci-small.yaml \
            --config configs/matrix.yaml \
            --max-examples 5 \
            --skip-quality \
            --output-dir results/ci-smoke || true
          # Smoke test is allowed to fail (no live ollama in CI); we only
          # want to verify dry-run + import wiring.

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-linux-cpu
          path: results/
          if-no-files-found: ignore
